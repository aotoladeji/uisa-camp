version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: uisa_camp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Network_admin
      MYSQL_DATABASE: uisa_camp
      MYSQL_USER: uisa_user
      MYSQL_PASSWORD: Network_admin
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
